<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>😂 Random Joke Generator</h1>
            <p class="subtitle">Get a laugh with random jokes from the internet!</p>
        </header>

        <main>
            <div class="joke-container">
                <div class="joke-display" id="jokeDisplay">
                    <p id="jokeText">Click the button to get a joke!</p>
                    <p id="jokeAnswer" class="joke-answer" style="display: none;"></p>
                </div>

                <div class="button-group">
                    <button id="getJokeBtn" class="btn btn-primary">
                        <span class="btn-icon">🎭</span> Get a Joke
                    </button>
                    <button id="revealBtn" class="btn btn-secondary" style="display: none;">
                        <span class="btn-icon">🎉</span> Reveal Answer
                    </button>
                    <button id="shareBtn" class="btn btn-share" style="display: none;">
                        <span class="btn-icon">📤</span> Share
                    </button>
                </div>

                <div class="joke-category">
                    <label for="categorySelect">Select Category:</label>
                    <select id="categorySelect">
                        <option value="random">Random</option>
                        <option value="programming">Programming</option>
                        <option value="knock-knock">Knock Knock</option>
                        <option value="general">General</option>
                    </select>
                </div>

                <div class="joke-stats">
                    <p>Jokes Generated: <span id="jokeCount">0</span></p>
                </div>
            </div>

            <div class="joke-history">
                <h2>📋 Joke History</h2>
                <div id="historyList" class="history-list"></div>
                <button id="clearHistoryBtn" class="btn btn-reset">Clear History</button>
            </div>
        </main>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading joke...</p>
        </div>

        <div class="error" id="errorMessage" style="display: none;"></div>

        <footer>
            <p>&copy; 2024 Random Joke Generator | Powered by JokeAPI</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
